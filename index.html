<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backdrop — Generative Design Engine</title>
    <meta name="description" content="Generative background engine with timeline animation and pattern export">

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css?v=7">
    <link rel="stylesheet" href="css/base.css?v=7">
    <link rel="stylesheet" href="css/toolbar.css?v=7">
    <link rel="stylesheet" href="css/panels.css?v=7">
    <link rel="stylesheet" href="css/components.css?v=7">

    <link rel="stylesheet" href="css/timeline.css?v=7">
    <link rel="stylesheet" href="css/modals.css?v=7">
    <link rel="stylesheet" href="css/responsive.css?v=7">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><path d='M29 17h21c9.2 0 16.7 5.4 16.7 13.3s-5 11.7-10.4 12.9c7.5 1.3 14.6 6.3 14.6 15.4C70.9 67.8 62.6 73 52.2 73H29z M41.5 25v16.7h6.3c5.8 0 10.4-2.5 10.4-8.3s-4.6-8.3-10.4-8.3zm0 25v18.8h8.3c6.7 0 11.7-2.9 11.7-9.2S56.5 50 50 50z' fill='white'/></svg>">
</head>
<body>

<div class="app-layout">

    <!-- ===== TOOLBAR ===== -->
    <div class="toolbar">
        <div class="toolbar-brand">
            <div class="toolbar-logo">
                <svg viewBox="0 0 24 24"><path d="M7 4h5c2.2 0 4 1.3 4 3.2s-1.2 2.8-2.5 3.1c1.8.3 3.5 1.5 3.5 3.7 0 2.2-2 3.5-4.5 3.5H7z M10 6v4h1.5c1.4 0 2.5-.6 2.5-2s-1.1-2-2.5-2zm0 6v4.5h2c1.6 0 2.8-.7 2.8-2.2S13.6 12 12 12z"/></svg>
            </div>
            <span class="toolbar-title">Backdrop</span>
        </div>

        <div class="toolbar-group">
            <button class="toolbar-btn" id="btn-undo" title="Undo (Ctrl+Z)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            </button>
            <button class="toolbar-btn" id="btn-redo" title="Redo (Ctrl+Shift+Z)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
            </button>
        </div>

        <div class="toolbar-separator"></div>

        <button class="toolbar-play" id="btn-play" title="Play/Pause (Space)">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="white"/></svg>
        </button>

        <div class="speed-group">
            <button class="speed-btn" data-speed="0.5">0.5x</button>
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="2">2x</button>
        </div>

        <span class="time-display" id="time-display">00:00.0</span>

        <div class="toolbar-separator"></div>

        <div class="toolbar-group">
            <button class="toolbar-btn" id="btn-fullscreen" title="Fullscreen (F)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>

            <button class="toolbar-btn" id="btn-cmd" title="Command Palette (Ctrl+K)" onclick="Studio.Events.emit('commandPalette:toggle')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
            </button>
        </div>

        <div class="toolbar-spacer"></div>

        <button class="toolbar-export-btn" id="btn-export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Export
        </button>
    </div>

    <!-- ===== LEFT PANEL ===== -->
    <div class="panel-left">
        <div class="panel-header" style="padding: 10px 16px; border-bottom: 1px solid var(--border);">
            <span style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary);">Patterns</span>
        </div>
        <div class="panel-content">
            <div class="panel-section">
                <div class="pattern-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="pattern-search-input" placeholder="Search patterns...">
                </div>
                <div id="pattern-categories" class="category-pills"></div>
                <div id="pattern-grid" class="pattern-grid"></div>
            </div>

            <div class="panel-section">
                <div class="section-title">
                    <span>Palettes</span>
                </div>
                <div id="palette-categories" class="category-pills"></div>
                <div id="palette-grid" class="palette-grid"></div>
                <div id="custom-colors" class="custom-colors">
                    <button class="palette-swatch custom-palette-btn" id="btn-custom-palette">
                        <span class="palette-name">Custom</span>
                    </button>
                    <div class="color-input-wrap">
                        <label>Color 1</label>
                        <input type="color" value="#050508">
                    </div>
                    <div class="color-input-wrap">
                        <label>Color 2</label>
                        <input type="color" value="#1a2540">
                    </div>
                    <div class="color-input-wrap">
                        <label>Color 3</label>
                        <input type="color" value="#2e6080">
                    </div>
                    <div class="color-input-wrap">
                        <label>Color 4</label>
                        <input type="color" value="#60a0c0">
                    </div>
                    <div class="color-input-wrap">
                        <label>Color 5</label>
                        <input type="color" value="#a0d0e0">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== CANVAS ===== -->
    <div class="canvas-area">
        <canvas id="glcanvas"></canvas>
        <div class="canvas-overlay">
            <button class="toolbar-btn" onclick="Studio.Events.emit('toolbar:fullscreen')" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
        </div>
    </div>

    <!-- ===== RIGHT PANEL ===== -->
    <div class="panel-right">
        <div class="panel-header" style="padding: 10px 16px; border-bottom: 1px solid var(--border);">
            <span style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary);">Properties</span>
        </div>
        <div class="panel-content" id="properties-content">
            <!-- Properties panel renders here -->
        </div>
    </div>

    <!-- ===== TIMELINE ===== -->
    <div class="timeline-panel">
        <div class="timeline-header">
            <button class="toolbar-btn" id="btn-timeline-toggle" title="Toggle Timeline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <span class="timeline-title">Timeline</span>
            <div class="timeline-controls">
                <label class="timeline-dur-label">Duration:
                    <input type="number" id="timeline-duration" min="1" max="10" step="1" value="4" class="timeline-dur-input"> s
                </label>
            </div>
        </div>
        <div class="timeline-body">
            <div id="timeline-ruler" class="timeline-ruler"></div>
            <div id="timeline-bar" class="timeline-bar">
                <div id="timeline-playhead" class="timeline-playhead"></div>
                <div id="timeline-tracks" class="timeline-tracks"></div>
            </div>
        </div>
    </div>

</div>

<!-- ===== COMMAND PALETTE ===== -->
<div class="cmd-palette-overlay" id="command-palette">
    <div class="cmd-palette">
        <input type="text" class="cmd-input" placeholder="Type a command, pattern, or preset...">
        <div class="cmd-list"></div>
    </div>
</div>

<!-- ===== EXPORT MODAL ===== -->
<div class="modal-overlay" id="export-modal">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Export</h2>
            <button class="modal-close" onclick="Studio.UI.Modals.closeAll()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="export-tabs">
            <button class="export-tab active">PNG</button>
            <button class="export-tab">GIF</button>
        </div>
        <div class="modal-body">
            <!-- PNG Panel -->
            <div class="export-panel active">
                <div class="param-row">
                    <label class="param-label">Resolution</label>
                    <select id="png-resolution" class="select-input">
                        <option value="1">1920 × 1080 (Full HD)</option>
                        <option value="2" selected>3840 × 2160 (4K)</option>
                        <option value="3">7680 × 4320 (8K)</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-block" id="btn-export-png">Export PNG</button>
            </div>
            <!-- GIF Panel -->
            <div class="export-panel">
                <div class="param-row">
                    <label class="param-label">Resolution</label>
                    <select id="gif-size" class="select-input">
                        <option value="480">480p</option>
                        <option value="640">640p</option>
                        <option value="1280" selected>1280p (HD)</option>
                        <option value="1920">1920p (Full HD)</option>
                    </select>
                </div>
                <div class="param-row">
                    <label class="param-label">Duration (seconds)</label>
                    <input type="number" id="gif-duration" class="param-value" value="4" min="1" max="10">
                </div>
                <div class="param-row">
                    <label class="param-label">Frame Rate</label>
                    <select id="gif-fps" class="select-input">
                        <option value="10">10 fps</option>
                        <option value="15" selected>15 fps (Recommended)</option>
                        <option value="20">20 fps</option>
                        <option value="24">24 fps</option>
                    </select>
                </div>
                <div id="gif-size-estimate" style="color: var(--text-secondary); font-size: 11px; text-align: center; padding: 8px 0;"></div>
                <button class="btn btn-primary btn-block" id="btn-export-gif">Export GIF</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== KEYBOARD SHORTCUTS OVERLAY ===== -->
<div class="shortcuts-overlay" id="shortcuts-overlay">
    <div class="shortcuts-panel">
        <div class="modal-header">
            <h2 class="modal-title">Keyboard Shortcuts</h2>
            <button class="modal-close" onclick="Studio.UI.Shortcuts.toggleHelp()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="shortcuts-content" class="shortcuts-content"></div>
    </div>
</div>

<!-- ===== SCRIPTS (load order matters) ===== -->
<!-- Namespace (first) -->
<script src="js/namespace.js?v=7"></script>

<!-- Shaders -->
<script src="js/shaders/common.js?v=7"></script>
<script src="js/shaders/vertex.js?v=7"></script>
<script src="js/shaders/patterns-classic.js?v=7"></script>
<script src="js/shaders/post-composite.js?v=7"></script>
<script src="js/shaders/post-extras.js?v=7"></script>

<!-- Data -->
<script src="js/data/palettes.js?v=7"></script>
<script src="js/data/easing.js?v=7"></script>

<!-- Core Engine -->
<script src="js/core/gl-engine.js?v=7"></script>
<script src="js/core/post-processing.js?v=7"></script>
<script src="js/core/render-pipeline.js?v=7"></script>

<!-- Systems -->
<script src="js/systems/state.js?v=7"></script>
<script src="js/systems/history.js?v=7"></script>
<script src="js/systems/timeline-engine.js?v=7"></script>
<script src="js/systems/gif-encoder.js?v=7"></script>
<script src="js/systems/export.js?v=7"></script>
<script src="js/systems/project.js?v=7"></script>

<!-- UI (order matters: dependencies first) -->
<script src="js/ui/toasts.js?v=7"></script>
<script src="js/ui/shortcuts.js?v=7"></script>
<script src="js/ui/context-menu.js?v=7"></script>
<script src="js/ui/toolbar.js?v=7"></script>
<script src="js/ui/command-palette.js?v=7"></script>
<script src="js/ui/pattern-browser.js?v=7"></script>
<script src="js/ui/palette-editor.js?v=7"></script>
<script src="js/ui/properties-panel.js?v=7"></script>
<script src="js/ui/timeline-ui.js?v=7"></script>
<script src="js/ui/modals.js?v=7"></script>

<!-- App init (LAST) -->
<script src="js/ui/app.js?v=7"></script>

</body>
</html>
